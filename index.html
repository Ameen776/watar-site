<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام فواتير المياه</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: 'Noto Naskh Arabic', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        #controlSection {
            padding: 10px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #16213e;
            margin-bottom: 6px;
            font-size: 1rem;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.2);
        }

        .calculation-box {
            background: linear-gradient(135deg, #f4d03f, #d4af37);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            border: 2px solid #b8941f;
            display: none;
        }

        .calculation-box .calc-label {
            font-size: 14px;
            color: #1e3a5c;
            font-weight: 700;
        }

        .calculation-box .calc-result {
            font-size: 28px;
            color: #1e1e1e;
            font-weight: 900;
        }

        .calculation-box .calc-detail {
            font-size: 12px;
            color: #555;
        }

        .btn-submit,
        .btn-view,
        .btn-pdf,
        .btn-back {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            color: white;
            letter-spacing: 1px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #e94560, #c73e54);
        }

        .btn-view {
            background: linear-gradient(135deg, #0f3460, #16213e);
        }

        .btn-pdf {
            background: linear-gradient(135deg, #28a745, #1e7e34);
        }

        .btn-back {
            background: linear-gradient(135deg, #6c757d, #495057);
        }

        .btn-submit:hover,
        .btn-view:hover,
        .btn-pdf:hover,
        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 1.2rem;
        }

        .records-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .records-section h2 {
            color: #16213e;
            margin-bottom: 15px;
            text-align: center;
        }

        .record-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid #e94560;
        }

        .record-info strong {
            font-size: 18px;
            color: #1a1a2e;
        }

        .record-info span {
            display: inline-block;
            margin-left: 10px;
            color: #555;
            font-size: 15px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .empty-msg {
            text-align: center;
            color: #888;
            padding: 20px;
        }

        /* ===== الفاتورة - بحجم A4 بالكامل ===== */
        #receiptSection {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #3d2b1a;
            z-index: 9999;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
        }

        .receipt-wrapper {
            width: 210mm;
            min-height: 297mm;
            max-width: 100%;
            margin: 0 auto;
            background: linear-gradient(180deg, #6b4423 0%, #4a2e15 100%);
            padding: 5mm;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .receipt-inner {
            background: #f5f0e6;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 287mm;
        }

        /* ===== البانر العلوي ===== */
        .top-banner {
            height: 85px;
            background: linear-gradient(180deg, #1a4a6e 0%, #0d2d4a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== الشعارات في الزوايا العلوية ===== */

        /* الشعار الأيسر: خدمة عملاء لتعبئة السيارات */
        .top-left-logo {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .top-left-logo .shield-icon {
            width: 55px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 3px;
            border: 2px solid #f5f0e6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .top-left-logo .shield-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .top-left-logo p {
            font-size: 11px;
            color: #f5f0e6;
            font-weight: 900;
            line-height: 1.3;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            margin: 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* الشعار الأيمن: رمز المياه مع الصورة */
        .top-right-logo {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .top-right-logo .water-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #d0d0d0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #d4af37;
            font-size: 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .top-right-logo .water-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .top-right-logo .water-icon .faucet-emoji {
            font-size: 28px;
        }

        .top-right-logo p {
            font-size: 10px;
            color: #f5f0e6;
            font-weight: 900;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            margin: 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* الشعار المركزي */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #d4af37, #a8841f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #f5f0e6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .center-logo-inner {
            width: 52px;
            height: 52px;
            background: linear-gradient(180deg, #2a7ab8, #1a5a8a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-logo-inner::before {
            content: '💧';
            font-size: 26px;
            filter: brightness(1.5);
        }

        /* ===== المحتوى ===== */
        .content {
            padding: 12px 22px 10px;
            position: relative;
            min-height: calc(287mm - 85px);
        }

        /* ===== الشعار الأيسر الداخلي ===== */
        .left-shield {
            position: absolute;
            top: 12px;
            left: 18px;
            text-align: center;
            z-index: 5;
        }

        .left-shield .shield-icon {
            width: 85px;
            height: 95px;
            position: relative;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-shield .shield-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .left-shield p {
            font-size: 13px;
            color: #1e4a6e;
            font-weight: 900;
            line-height: 1.5;
            margin: 0;
        }

        /* ===== الشعار الأيمن الداخلي ===== */
        .faucet {
            position: absolute;
            top: 12px;
            right: 18px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #d0d0d0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #d4af37;
            font-size: 30px;
            z-index: 5;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        /* ===== العنوان ===== */
        .header-info {
            text-align: center;
            margin-top: 5px;
            margin-bottom: 14px;
            padding-top: 5px;
        }

        .main-title {
            color: #b8941f;
            font-size: 40px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .project-location {
            color: #b8941f;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .date-line,
        .time-line {
            color: #1e4a6e;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 2px;
        }

        /* ===== الجدول ===== */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 12px 0;
            border: 3px solid #b8941f;
            border-radius: 8px;
            overflow: hidden;
        }

        .data-table th {
            background: linear-gradient(180deg, #b8941f, #9a7b1a);
            color: white;
            padding: 16px 10px;
            font-size: 22px;
            font-weight: 900;
            border: 1px solid #9a7b1a;
            text-align: center;
        }

        .data-table td {
            background: linear-gradient(180deg, #d4af37, #b8941f);
            padding: 18px 10px;
            text-align: center;
            font-size: 22px;
            color: #1e1e1e;
            font-weight: 900;
            border: 1px solid #c9a227;
        }

        /* ===== المربعات السفلية ===== */
        .summary-boxes {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .summary-box {
            flex: 1;
            background: linear-gradient(180deg, #f4d03f, #d4af37, #b8941f);
            border: 3px solid #8b6914;
            border-radius: 10px;
            padding: 16px 10px;
            text-align: center;
            position: relative;
        }

        .summary-box .corner-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #1e4a6e, #0d2d4a);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #c9a227;
        }

        .corner-top {
            top: -8px;
        }
        .corner-bottom {
            bottom: -8px;
        }

        .summary-box .label {
            color: #1e3a5c;
            font-size: 18px;
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
        }

        .summary-box .value {
            color: #1e1e1e;
            font-size: 32px;
            font-weight: 900;
        }

        /* ===== قسم التواصل ===== */
        .contact-section {
            display: flex;
            margin: 15px 0 0;
            border: 3px solid #b8941f;
            border-radius: 10px;
            overflow: hidden;
        }

        .contact-left {
            width: 140px;
            background: #f0ebe0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 10px;
            border-left: 3px solid #b8941f;
        }

        .harisi-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #b8941f;
            margin-bottom: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .harisi-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contact-left .name {
            font-size: 24px;
            color: #b8941f;
            font-weight: 900;
        }

        .contact-left .line {
            width: 60px;
            height: 3px;
            background: #b8941f;
            margin: 3px 0;
        }

        .contact-right {
            flex: 1;
            background: linear-gradient(180deg, #c9a227, #a8841f);
            padding: 16px 20px;
            color: #1e1e1e;
        }

        .phone-line {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 6px;
            text-align: center;
        }

        .note-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 6px;
            text-align: center;
        }

        .note-text {
            font-size: 18px;
            line-height: 1.7;
            text-align: center;
            font-weight: 700;
        }

        /* ===== التذييل ===== */
        .footer {
            background: linear-gradient(180deg, #c9a227, #a8841f);
            padding: 18px;
            text-align: center;
            color: #1e1e1e;
            font-size: 20px;
            font-weight: 900;
            margin-top: 15px;
            border-radius: 6px;
            letter-spacing: 1px;
            width: 100%;
            clear: both;
        }

        /* ===== الزخارف ===== */
        .pen-decoration {
            position: absolute;
            bottom: 15px;
            left: -10px;
            width: 36px;
            height: 150px;
            background: linear-gradient(90deg, #0a0a0a 0%, #2a2a2a 25%, #0a0a0a 50%, #2a2a2a 75%, #0a0a0a 100%);
            border-radius: 4px;
            transform: rotate(-15deg);
            z-index: 5;
            box-shadow: 3px 3px 12px rgba(0, 0, 0, 0.6);
        }

        .pen-decoration::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 20px solid #d4af37;
        }

        .pen-decoration::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid #d4af37;
        }

        .pen-ring {
            position: absolute;
            bottom: 45px;
            left: -6px;
            width: 30px;
            height: 7px;
            background: linear-gradient(90deg, #d4af37, #b8941f, #d4af37);
            border-radius: 4px;
            transform: rotate(-15deg);
            z-index: 6;
        }

        .watermark {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 150px;
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
        }

        .watermark::before {
            content: '💧';
            font-size: 100px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ===== الأزرار في الأسفل ===== */
        .receipt-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            padding: 0 10px 15px;
            max-width: 210mm;
            margin-left: auto;
            margin-right: auto;
        }

        .receipt-buttons button {
            flex: 1;
            padding: 18px;
            font-size: 1.4rem;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .receipt-buttons .btn-pdf {
            background: linear-gradient(135deg, #28a745, #1e7e34);
        }

        .receipt-buttons .btn-back {
            background: linear-gradient(135deg, #6c757d, #495057);
        }

        .receipt-buttons button:hover {
